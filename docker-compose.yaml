#version: '3.9'


services:

  nginx:
     image: nginx:alpine
     container_name: mynginx
     restart: unless-stopped
     ports:
       - "8082:80"
     volumes:
       - ./nginx.conf:/etc/nginx/nginx.conf:ro
     networks:
       - backend

  mysql:
    image: mysql
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    container_name: mysql-container
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
     - backend

    #Note :-> without expose application doesn't know mysql, how ever if there are in same network without      exposing also ther
    # can communation each other
#    expose:
#    - "3306"


  app:
    build:
      context: .
      dockerfile: dockerFilecomposeproject-dev
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mysql
    ports:
      - "8084:8084"
    networks:
      - backend

volumes:
      mysql_data:

networks:
      backend:
        driver: bridge

